<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Pencil body -->
  <rect x="6" y="4" width="14" height="24" rx="2" transform="rotate(-45 16 16)" fill="#F5F0E6" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pencil tip -->
  <polygon points="26.5,5.5 28.5,7.5 7.5,28.5 5.5,26.5" fill="#D4A84B" stroke="#1B2A4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pencil point -->
  <polygon points="5.5,26.5 4,30 7.5,28.5" fill="#1B2A4A"/>
  <!-- Eraser band -->
  <rect x="18" y="2" width="5" height="3" rx="1" transform="rotate(-45 20.5 3.5)" fill="#C4613A" stroke="#1B2A4A" stroke-width="1"/>
</svg>
